<!doctype html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z461DDLWK7"></script>
  <script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Evileye & Momon Drop Puzzle</title>
  <style>
    :root {
      color-scheme: dark;
      --app-height: 100dvh;
      --bg: #19140f;
      --panel: #2a2119;
      --panel-2: #3a2a1d;
      --ink: #fff4d8;
      --muted: #d7bd8a;
      --accent: #86d1ff;
      --danger: #ff6e72;
      --gold: #ffd36a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(rgba(5, 8, 12, 0.12), rgba(5, 8, 12, 0.24)),
        url("assets/img/ui/background.png") center top / auto var(--app-height) no-repeat;
      background-color: #0f0c09;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      height: 100vh;
      height: 100dvh;
      height: var(--app-height);
      display: grid;
      place-items: center;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
      overflow: hidden;
    }

    .app {
      width: min(100%, 460px, calc((var(--app-height) - 158px) * 0.6));
      display: grid;
      gap: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 74px;
      gap: 8px;
      align-items: stretch;
    }

    .hud-wrap {
      display: grid;
      gap: 6px;
    }

    .score-card,
    .next-card {
      position: relative;
      display: grid;
      align-content: center;
      border: 0;
      border-radius: 0;
      background-color: rgba(24, 28, 30, 0.96);
      background-position: center;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      box-shadow: none;
    }

    .score-card {
      min-height: 52px;
      padding: 7px 12px 8px;
      background-image: url("assets/img/ui/score.png");
    }

    .label {
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .score,
    .best-score {
      display: block;
      margin-top: 2px;
      color: var(--gold);
      font-size: clamp(1.15rem, 5vw, 1.8rem);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .best-score {
      color: #bfeeff;
    }

    .next-card {
      width: 74px;
      min-height: 74px;
      padding: 8px;
      background-image: url("assets/img/ui/next.png");
      text-align: center;
    }

    .next-preview {
      position: relative;
      height: 44px;
      display: grid;
      place-items: center;
      font-weight: 900;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
    }

    .next-preview.is-obstacle-preview::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 999px;
      border: 1px solid rgba(255, 45, 55, 0.75);
      background: radial-gradient(circle, rgba(255, 25, 38, 0.28), rgba(255, 25, 38, 0) 68%);
      box-shadow:
        0 0 12px rgba(255, 38, 52, 0.72),
        inset 0 0 9px rgba(255, 38, 52, 0.42);
      animation: obstaclePulse 900ms ease-in-out infinite alternate;
      pointer-events: none;
    }

    .next-preview.is-obstacle-preview {
      filter: drop-shadow(0 0 7px rgba(255, 35, 45, 0.7));
    }

    @keyframes obstaclePulse {
      from {
        opacity: 0.5;
        transform: scale(0.92) rotate(0deg);
      }

      to {
        opacity: 1;
        transform: scale(1.12) rotate(10deg);
      }
    }

    .field-shell {
      position: relative;
      overflow: visible;
      border: 0;
      border-radius: 8px;
      background: transparent;
      box-shadow: none;
      touch-action: none;
    }

    .field-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background: transparent;
      pointer-events: none;
    }

    .board {
      --frame-top: 22%;
      --frame-width: 114%;
      --canvas-bleed-x: 4px;
      --canvas-bleed-bottom: 8px;
      position: relative;
      width: 100%;
      aspect-ratio: 360 / 600;
      touch-action: none;
    }

    .puzzle-frame {
      position: absolute;
      left: 50%;
      top: var(--frame-top);
      width: var(--frame-width);
      aspect-ratio: 45 / 56;
      z-index: 0;
      background: url("assets/img/ui/pazzlearea.png") center / 100% 100% no-repeat;
      pointer-events: none;
      transform: translateX(-50%);
    }

    canvas {
      position: absolute;
      top: 0;
      left: calc(var(--canvas-bleed-x) * -1);
      z-index: 1;
      display: block;
      width: calc(100% + var(--canvas-bleed-x) * 2);
      height: calc(100% + var(--canvas-bleed-bottom));
      aspect-ratio: 360 / 600;
      cursor: pointer;
    }

    .line-label {
      position: absolute;
      top: 23.667%;
      left: 12px;
      z-index: 2;
      color: var(--danger);
      font-size: 0.84rem;
      font-weight: 800;
      pointer-events: none;
      text-shadow: 0 1px 2px #000;
    }

    .hold-meter {
      position: relative;
      width: min(62%, 220px);
      height: 24px;
      justify-self: center;
      overflow: visible;
      border-radius: 999px;
      opacity: 0;
      transition: opacity 120ms ease;
      pointer-events: none;
    }

    .hold-meter.is-visible {
      opacity: 1;
    }

    .hold-meter > span {
      display: block;
      width: var(--hold, 0%);
      height: 6px;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff3b45, #ff9c42);
      box-shadow: 0 0 8px rgba(255, 55, 65, 0.72);
      transition: width 60ms linear;
    }

    .hold-meter::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      z-index: -1;
    }

    .ready-badge {
      position: absolute;
      left: calc(50% + min(31%, 110px) + 60px);
      top: 8px;
      z-index: 3;
      transform: translateX(-100%) scale(0.82);
      padding: 0;
      border: 0;
      background: transparent;
      color: #ffdf55;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      opacity: 0;
      pointer-events: none;
      text-shadow:
        0 0 5px rgba(255, 54, 64, 0.95),
        0 1px 2px #000;
      transition: opacity 80ms ease;
    }

    .ready-badge.is-visible {
      opacity: 1;
      animation: kickReadyPulse 420ms ease-in-out infinite alternate;
    }

    @keyframes kickReadyPulse {
      from {
        transform: translateX(-100%) scale(0.92);
      }

      to {
        transform: translateX(-100%) scale(1.18);
      }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(7, 5, 4, 0.72);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .dialog {
      width: min(100%, 280px);
      padding: 20px;
      border: 1px solid rgba(255, 211, 106, 0.45);
      border-radius: 8px;
      background: linear-gradient(180deg, #3a2a1d, #1e1712);
      text-align: center;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.38);
    }

    .dialog h1 {
      margin: 0 0 8px;
      color: var(--danger);
      font-size: 2rem;
      line-height: 1;
    }

    .dialog p {
      margin: 0 0 16px;
      color: var(--muted);
      font-weight: 700;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffe08a, #c8832d);
      color: #241105;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    @media (min-width: 760px) {
      body {
        padding: 16px;
      }

      .app {
        width: min(100%, 520px, calc((var(--app-height) - 160px) * 0.6));
      }

      .next-card {
        width: 80px;
        min-height: 80px;
      }
    }

    @media (max-width: 600px) and (max-height: 720px) {
      .app {
        width: min(100%, 390px, calc((var(--app-height) - 182px) * 0.6));
        gap: 8px;
      }

      .hud {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 64px;
        gap: 6px;
      }

      .score-card {
        min-height: 48px;
        padding: 6px 10px 7px;
      }

      .next-card {
        width: 64px;
        min-height: 64px;
        padding: 7px;
      }

      .score,
      .best-score {
        font-size: 1.2rem;
      }

    }
  </style>
</head>
<body>
  <main class="app" aria-label="物理合体パズル">
    <section class="hud-wrap" aria-label="スコアと次の果物">
      <div class="hud">
        <div class="score-card">
          <span class="label">SCORE</span>
          <span class="score" id="score">0</span>
        </div>
        <div class="score-card">
          <span class="label">BEST</span>
          <span class="best-score" id="bestScore">0</span>
        </div>
        <div class="next-card">
          <span class="label">NEXT</span>
          <div class="next-preview" id="nextPreview"></div>
        </div>
      </div>
      <div class="hold-meter" id="holdMeter">
        <span></span>
        <div class="ready-badge" id="readyBadge">KICK!</div>
      </div>
    </section>

    <section class="field-shell" id="fieldShell">
      <div class="board">
        <span class="line-label">GAME OVER LINE</span>
        <div class="puzzle-frame" aria-hidden="true"></div>
        <canvas id="gameCanvas" width="360" height="600" aria-label="ゲームフィールド"></canvas>
        <div class="overlay" id="gameOverOverlay">
          <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
            <h1 id="gameOverTitle">GAME OVER</h1>
            <p>FINAL SCORE <span id="finalScore">0</span></p>
            <button type="button" id="restartButton">RESTART</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script>
    (() => {
      "use strict";

      function syncViewportHeight() {
        const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty("--app-height", `${Math.floor(viewportHeight)}px`);
      }

      syncViewportHeight();
      window.addEventListener("resize", syncViewportHeight, { passive: true });
      window.visualViewport?.addEventListener("resize", syncViewportHeight, { passive: true });
      window.visualViewport?.addEventListener("scroll", syncViewportHeight, { passive: true });

      const { Engine, Runner, Bodies, Body, Composite, Events } = Matter;

      // ===== Constants: field, physics, score, timing =====
      const CONFIG = {
        fieldWidth: 360,
        fieldHeight: 600,
        wallThickness: 34,
        spawnY: 112,
        gameOverLineY: 172,
        gameOverGraceMs: 1800,
        mergeCooldownMs: 90,
        holdChargeMs: 200,
        holdReadyMs: 1000,
        kickPoseMs: 1500,
        obstacleChance: 0.10,
        gravityY: 1.08,
        fruitRestitution: 0.18,
        fruitFriction: 0.55,
        fruitFrictionAir: 0.015,
        obstacleHeavyDensity: 0.0048,
        normalDensity: 0.001,
        nextPoolCount: 5,
        debugMode: true,
        showHitCircle: false
      };

      // 画像に差し替える場合は image にURLを入れ、drawFruitBody/drawCurrentPieceで描画を切り替える。
      const FRUITS = [
        { id: "cherry", name: "さくらんぼ", radius: 11.5, score: 1, nextId: "strawberry", color: "#ef476f", text: "🍒", image: "assets/img/fruits/01_mob.png", imageScale: 1.12, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "strawberry", name: "いちご", radius: 15, score: 3, nextId: "grape", color: "#ff5a73", text: "🍓", image: "assets/img/fruits/02_Receptionist.png", imageScale: 1.16, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "grape", name: "ぶどう", radius: 23, score: 6, nextId: "dekopon", color: "#8f6ad9", text: "🍇", image: "assets/img/fruits/03_brita.png", imageScale: 1.18, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "dekopon", name: "デコポン", radius: 26.5, score: 10, nextId: "persimmon", color: "#ff9f1c", text: "🍊", image: "assets/img/fruits/04_ninya.png", imageScale: 1.18, imageOffsetX: 0, imageOffsetY: -2 },
        { id: "persimmon", name: "柿", radius: 33.5, score: 15, nextId: "apple", color: "#f07c2f", text: "柿", image: "assets/img/fruits/05_enri.png", imageScale: 1.32, imageOffsetX: -2, imageOffsetY: 10 },
        { id: "apple", name: "りんご", radius: 42, score: 21, nextId: "pear", color: "#e63946", text: "🍎", image: "assets/img/fruits/06_Nfirea.png", imageScale: 1.083, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "pear", name: "梨", radius: 50, score: 28, nextId: "peach", color: "#c7df66", text: "梨", image: "assets/img/fruits/07_Clementine.png", imageScale: 1.14, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "peach", name: "桃", radius: 60, score: 36, nextId: "pineapple", color: "#ffb3c1", text: "🍑", image: "assets/img/fruits/08_Jaldabaoth.png", imageScale: 1.2, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "pineapple", name: "パイン", radius: 70, score: 45, nextId: "melon", color: "#f9c74f", text: "🍍", image: "assets/img/fruits/09_hamusuke.png", imageScale: 1.12, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "melon", name: "メロン", radius: 85, score: 55, nextId: "watermelon", color: "#80b918", text: "🍈", image: "assets/img/fruits/10_Narbe.png", imageScale: 1.239, imageOffsetX: 10, imageOffsetY: -6 },
        { id: "watermelon", name: "スイカ", radius: 100, score: 66, nextId: null, color: "#2f9e44", text: "🍉", image: "assets/img/fruits/11_momon.png", imageScale: 1.16, imageOffsetX: 0, imageOffsetY: -14 }
      ];

      const OBSTACLES = [
        { id: "evil-a", name: "お邪魔小", radius: 23, density: 0.0050, heavyDensity: 0.0100, color: "#7c4dff", text: "12", image: "assets/img/obstacles/12_dyne_1.png", throwImage: "assets/img/obstacles/12_dyne_2.png", imageScale: 1.121, imageOffsetX: 0, imageOffsetY: 0 },
        { id: "evil-b", name: "お邪魔中", radius: 33.5, density: 0.0050, heavyDensity: 0.0100, color: "#00a6a6", text: "13", image: "assets/img/obstacles/13_nigun_1.png", throwImage: "assets/img/obstacles/13_nigun_2.png", imageScale: 1.067, imageOffsetX: 0, imageOffsetY: -2 },
        { id: "evil-c", name: "お邪魔大", radius: 50, density: 0.0050, heavyDensity: 0.0100, color: "#a64d79", text: "14", image: "assets/img/obstacles/14_buoh_1.png", throwImage: "assets/img/obstacles/14_buoh_2.png", imageScale: 1.16, imageOffsetX: 0, imageOffsetY: 0 }
      ];

      const UI_IMAGES = {
        fly: "assets/img/ui/evileye_fly.png",
        kick: "assets/img/ui/evileye_kick.png",
        angry: "assets/img/ui/angry.png"
      };

      const fruitById = new Map(FRUITS.map((fruit, index) => [fruit.id, { ...fruit, level: index }]));
      const imageCache = new Map();

      // ===== DOM / canvas =====
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const shell = document.getElementById("fieldShell");
      const board = shell.querySelector(".board");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");
      const nextPreview = document.getElementById("nextPreview");
      const overlay = document.getElementById("gameOverOverlay");
      const finalScoreEl = document.getElementById("finalScore");
      const restartButton = document.getElementById("restartButton");
      const readyBadge = document.getElementById("readyBadge");
      const holdMeter = document.getElementById("holdMeter");
      const holdMeterBar = holdMeter.querySelector("span");

      // ===== Game state =====
      const state = {
        engine: null,
        runner: null,
        score: 0,
        bestScore: 0,
        current: null,
        next: null,
        pointerX: CONFIG.fieldWidth / 2,
        isGameOver: false,
        isPointerDown: false,
        holdStartAt: 0,
        holdProgress: 0,
        overLineSince: null,
        effects: [],
        pendingMerges: new Set(),
        rafId: 0,
        lastDropAt: 0,
        characterSide: "right"
      };

      // ===== Utility =====
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const now = () => performance.now();
      const randomItem = (items) => items[Math.floor(Math.random() * items.length)];
      const nextFruitData = () => ({ type: "fruit", data: FRUITS[Math.floor(Math.random() * CONFIG.nextPoolCount)] });
      const nextObstacleData = () => ({ type: "obstacle", data: randomItem(OBSTACLES) });
      const randomDropData = () => Math.random() < CONFIG.obstacleChance ? nextObstacleData() : nextFruitData();
      const BEST_SCORE_KEY = "evileye-momon-best-score";

      function preloadImages() {
        for (const item of [...FRUITS, ...OBSTACLES]) {
          for (const src of [item.image, item.throwImage]) {
            if (!src || imageCache.has(src)) continue;
            const image = new Image();
            image.src = src;
            imageCache.set(src, image);
          }
        }

        for (const src of Object.values(UI_IMAGES)) {
          if (imageCache.has(src)) continue;
          const image = new Image();
          image.src = src;
          imageCache.set(src, image);
        }
      }

      function setScore(value) {
        state.score = value;
        scoreEl.textContent = String(state.score);
        updateBestScore(state.score);
      }

      function readBestScore() {
        const saved = Number(localStorage.getItem(BEST_SCORE_KEY));
        return Number.isFinite(saved) && saved > 0 ? Math.floor(saved) : 0;
      }

      function setBestScore(value) {
        state.bestScore = value;
        bestScoreEl.textContent = String(state.bestScore);
      }

      function updateBestScore(score) {
        if (score <= state.bestScore) return;
        setBestScore(score);
        localStorage.setItem(BEST_SCORE_KEY, String(score));
      }

      function toFieldX(clientX) {
        const rect = board.getBoundingClientRect();
        return clamp((clientX - rect.left) * CONFIG.fieldWidth / rect.width, 0, CONFIG.fieldWidth);
      }

      function clampCurrentX(x) {
        if (!state.current) return x;
        const radius = state.current.data.radius;
        return clamp(x, radius + 8, CONFIG.fieldWidth - radius - 8);
      }

      // ===== Physics management =====
      function createEngine() {
        const engine = Engine.create();
        engine.gravity.y = CONFIG.gravityY;

        const t = CONFIG.wallThickness;
        const wallOptions = {
          isStatic: true,
          friction: 0.9,
          restitution: 0.08,
          render: { visible: false }
        };

        const playableHeight = CONFIG.fieldHeight - CONFIG.gameOverLineY;
        const wallY = CONFIG.gameOverLineY + playableHeight / 2;
        const leftWall = Bodies.rectangle(-t / 2, wallY, t, playableHeight, wallOptions);
        const rightWall = Bodies.rectangle(CONFIG.fieldWidth + t / 2, wallY, t, playableHeight, wallOptions);
        const floor = Bodies.rectangle(CONFIG.fieldWidth / 2, CONFIG.fieldHeight + t / 2, CONFIG.fieldWidth + t * 2, t, wallOptions);

        Composite.add(engine.world, [leftWall, rightWall, floor]);
        Events.on(engine, "collisionStart", handleCollisionStart);
        return engine;
      }

      function createFruitBody(drop, x, y) {
        const isObstacle = drop.type === "obstacle";
        const data = drop.data;
        const body = Bodies.circle(x, y, data.radius, {
          restitution: CONFIG.fruitRestitution,
          friction: CONFIG.fruitFriction,
          frictionAir: CONFIG.fruitFrictionAir,
          density: isObstacle ? data.density : CONFIG.normalDensity,
          label: isObstacle ? "obstacle" : "fruit"
        });

        body.plugin.kind = drop.type;
        body.plugin.dataId = data.id;
        body.plugin.level = isObstacle ? -1 : fruitById.get(data.id).level;
        body.plugin.radius = data.radius;
        body.plugin.spawnedAt = now();
        body.plugin.isMerging = false;
        body.plugin.isHeavy = false;
        return body;
      }

      function addBody(body) {
        Composite.add(state.engine.world, body);
      }

      function removeBodies(bodies) {
        Composite.remove(state.engine.world, bodies);
      }

      function activeBodies() {
        return Composite.allBodies(state.engine.world).filter((body) => body.plugin.kind === "fruit" || body.plugin.kind === "obstacle");
      }

      // ===== Fruit / obstacle management =====
      function prepareQueue() {
        state.current = state.next || randomDropData();
        state.next = randomDropData();
        state.pointerX = clampCurrentX(state.pointerX);
        updateNextPreview();
      }

      function changeCurrentFruitForDebug(direction) {
        if (!CONFIG.debugMode || state.isGameOver || !state.current) return;

        const currentLevel = state.current.type === "fruit"
          ? fruitById.get(state.current.data.id).level
          : 0;
        const nextLevel = (currentLevel + direction + FRUITS.length) % FRUITS.length;
        state.current = {
          type: "fruit",
          data: FRUITS[nextLevel]
        };
        state.pointerX = clampCurrentX(state.pointerX);
        resetHoldUi();
      }

      function changeCurrentObstacleForDebug() {
        if (!CONFIG.debugMode || state.isGameOver || !state.current) return;

        const currentIndex = state.current.type === "obstacle"
          ? OBSTACLES.findIndex((obstacle) => obstacle.id === state.current.data.id)
          : -1;
        const nextIndex = (currentIndex + 1 + OBSTACLES.length) % OBSTACLES.length;
        state.current = {
          type: "obstacle",
          data: OBSTACLES[nextIndex]
        };
        state.pointerX = clampCurrentX(state.pointerX);
        resetHoldUi();
      }

      function dropCurrent() {
        if (state.isGameOver || !state.current) return;
        state.lastDropAt = now();
        const body = createFruitBody(state.current, clampCurrentX(state.pointerX), CONFIG.spawnY);
        addBody(body);
        state.current = null;
        setTimeout(() => {
          if (!state.isGameOver) prepareQueue();
        }, 360);
      }

      function throwAwayCurrentObstacle() {
        if (!state.current || state.current.type !== "obstacle") return;
        const x = clampCurrentX(state.pointerX);
        const radius = state.current.data.radius;
        const leftSpace = x - radius;
        const rightSpace = CONFIG.fieldWidth - x - radius;
        let direction = rightSpace >= leftSpace ? 1 : -1;
        direction = chooseKickDirection(x, direction);
        state.characterSide = direction > 0 ? "left" : "right";
        const exitX = direction > 0 ? CONFIG.fieldWidth + radius * 2 : -radius * 2;
        const throwData = {
          ...state.current.data,
          image: state.current.data.throwImage || state.current.data.image
        };

        state.lastDropAt = now();
        state.effects.push({
          type: "throw",
          x,
          exitX,
          direction,
          y: CONFIG.spawnY,
          radius,
          data: throwData,
          bornAt: now(),
          life: 3000
        });
        state.effects.push({
          type: "kick",
          x,
          y: CONFIG.spawnY,
          direction,
          bornAt: now(),
          life: CONFIG.kickPoseMs
        });
        state.current = null;
        setTimeout(() => {
          if (!state.isGameOver) prepareQueue();
        }, CONFIG.kickPoseMs);
      }

      function maybeMakeObstacleHeavy() {
        for (const body of activeBodies()) {
          if (body.plugin.kind !== "obstacle" || body.plugin.isHeavy) continue;
          const settledEnough = now() - body.plugin.spawnedAt > 850;
          const nearBottomOrSlow = body.position.y > CONFIG.fieldHeight - 90 || Math.abs(body.velocity.y) < 0.16;
          if (settledEnough && nearBottomOrSlow) {
            const data = OBSTACLES.find((item) => item.id === body.plugin.dataId) || OBSTACLES[0];
            body.plugin.isHeavy = true;
            Body.setDensity(body, data.heavyDensity);
            Body.set(body, { friction: 0.95, frictionAir: 0.035 });
          }
        }
      }

      // ===== Merge management =====
      function handleCollisionStart(event) {
        if (state.isGameOver) return;

        for (const pair of event.pairs) {
          const a = pair.bodyA;
          const b = pair.bodyB;
          if (a.plugin.kind !== "fruit" || b.plugin.kind !== "fruit") continue;
          if (a.plugin.isMerging || b.plugin.isMerging) continue;
          if (a.plugin.level !== b.plugin.level) continue;

          const key = [a.id, b.id].sort((x, y) => x - y).join(":");
          if (state.pendingMerges.has(key)) continue;
          state.pendingMerges.add(key);

          setTimeout(() => {
            state.pendingMerges.delete(key);
            mergeBodies(a, b);
          }, CONFIG.mergeCooldownMs);
        }
      }

      function mergeBodies(a, b) {
        if (state.isGameOver) return;
        const bodies = activeBodies();
        if (!bodies.includes(a) || !bodies.includes(b)) return;
        if (a.plugin.isMerging || b.plugin.isMerging) return;

        a.plugin.isMerging = true;
        b.plugin.isMerging = true;

        const fruit = FRUITS[a.plugin.level];
        const x = (a.position.x + b.position.x) / 2;
        const y = (a.position.y + b.position.y) / 2;
        const velocity = {
          x: (a.velocity.x + b.velocity.x) / 2,
          y: (a.velocity.y + b.velocity.y) / 2
        };

        removeBodies([a, b]);
        setScore(state.score + fruit.score);
        createMergeEffect(x, y, fruit);

        if (fruit.nextId) {
          const nextData = fruitById.get(fruit.nextId);
          const nextBody = createFruitBody({ type: "fruit", data: nextData }, x, y);
          Body.setVelocity(nextBody, velocity);
          Body.setAngularVelocity(nextBody, (a.angularVelocity + b.angularVelocity) / 2);
          addBody(nextBody);
        }
      }

      function createMergeEffect(x, y, fruit) {
        state.effects.push({
          type: "merge",
          x,
          y,
          radius: fruit.radius,
          color: fruit.color,
          bornAt: now(),
          life: 360,
          particles: Array.from({ length: 9 }, (_, i) => ({
            angle: (Math.PI * 2 * i) / 9,
            speed: 1.8 + Math.random() * 2.2
          }))
        });
      }

      // ===== Game state management =====
      function checkGameOver() {
        if (state.isGameOver) return;

        const hasBodyOverLine = activeBodies().some((body) => {
          const radius = body.plugin.radius || 0;
          const oldEnough = now() - body.plugin.spawnedAt > 900;
          return oldEnough && body.position.y - radius < CONFIG.gameOverLineY;
        });

        if (hasBodyOverLine) {
          state.overLineSince ??= now();
          if (now() - state.overLineSince >= CONFIG.gameOverGraceMs) endGame();
        } else {
          state.overLineSince = null;
        }
      }

      function endGame() {
        state.isGameOver = true;
        state.current = null;
        Runner.stop(state.runner);
        finalScoreEl.textContent = String(state.score);
        overlay.classList.add("is-visible");
        resetHoldUi();
      }

      function restartGame() {
        cancelAnimationFrame(state.rafId);
        if (state.runner) Runner.stop(state.runner);
        if (state.engine) {
          Events.off(state.engine, "collisionStart", handleCollisionStart);
          Composite.clear(state.engine.world, false);
          Engine.clear(state.engine);
        }

        state.engine = createEngine();
        state.runner = Runner.create();
        state.isGameOver = false;
        state.current = null;
        state.next = null;
        state.pointerX = CONFIG.fieldWidth / 2;
        state.characterSide = "right";
        state.overLineSince = null;
        state.effects = [];
        state.pendingMerges.clear();
        setBestScore(readBestScore());
        setScore(0);
        overlay.classList.remove("is-visible");
        resetHoldUi();
        prepareQueue();
        Runner.run(state.runner, state.engine);
        drawLoop();
      }

      // ===== UI management =====
      function updateNextPreview() {
        const drop = state.next;
        if (!drop) {
          nextPreview.textContent = "";
          nextPreview.style.background = "";
          nextPreview.style.backgroundImage = "";
          nextPreview.classList.remove("is-obstacle-preview");
          return;
        }

        const size = Math.max(24, Math.min(40, drop.data.radius * 1.3));
        nextPreview.classList.toggle("is-obstacle-preview", drop.type === "obstacle");
        nextPreview.textContent = drop.data.image ? "" : drop.data.text;
        nextPreview.style.color = "#fff";
        nextPreview.style.fontSize = `${drop.type === "obstacle" ? 24 : size}px`;
        nextPreview.style.background = drop.data.image
          ? "rgba(0,0,0,.18)"
          : `radial-gradient(circle at 35% 30%, rgba(255,255,255,.45), ${drop.data.color} 62%, rgba(0,0,0,.28))`;
        nextPreview.style.backgroundImage = drop.data.image ? `url("${drop.data.image}")` : "";
        nextPreview.style.backgroundPosition = "center";
        nextPreview.style.backgroundRepeat = "no-repeat";
        nextPreview.style.backgroundSize = "contain";
        nextPreview.style.borderRadius = "999px";
        nextPreview.style.width = `${size}px`;
        nextPreview.style.margin = "5px auto 0";
      }

      function updateHoldUi() {
        if (!state.isPointerDown || !state.current || state.current.type !== "obstacle") {
          resetHoldUi();
          return;
        }

        const elapsed = now() - state.holdStartAt;
        state.holdProgress = clamp(elapsed / CONFIG.holdReadyMs, 0, 1);
        holdMeter.classList.add("is-visible");
        holdMeterBar.style.setProperty("--hold", `${Math.round(state.holdProgress * 100)}%`);
        readyBadge.classList.toggle("is-visible", elapsed >= CONFIG.holdReadyMs);
      }

      function resetHoldUi() {
        state.isPointerDown = false;
        state.holdStartAt = 0;
        state.holdProgress = 0;
        holdMeter.classList.remove("is-visible");
        readyBadge.classList.remove("is-visible");
        holdMeterBar.style.setProperty("--hold", "0%");
      }

      // ===== Input management =====
      function handlePointerMove(event) {
        if (state.isGameOver) return;
        state.pointerX = clampCurrentX(toFieldX(event.clientX));
      }

      function handlePointerDown(event) {
        if (state.isGameOver || event.button > 0) return;
        event.preventDefault();
        shell.setPointerCapture?.(event.pointerId);
        state.pointerX = clampCurrentX(toFieldX(event.clientX));
        state.isPointerDown = true;
        state.holdStartAt = now();
      }

      function handlePointerUp(event) {
        if (state.isGameOver || !state.isPointerDown) return;
        event.preventDefault();
        state.pointerX = clampCurrentX(toFieldX(event.clientX));
        const elapsed = now() - state.holdStartAt;
        const current = state.current;
        resetHoldUi();

        if (!current) return;
        if (current.type === "obstacle") {
          if (elapsed < CONFIG.holdChargeMs) {
            dropCurrent();
          } else if (elapsed >= CONFIG.holdReadyMs) {
            throwAwayCurrentObstacle();
          }
          return;
        }

        dropCurrent();
      }

      function handleClickFallback(event) {
        if (state.isGameOver || !state.current) return;
        if (now() - state.lastDropAt < 120) return;
        state.pointerX = clampCurrentX(toFieldX(event.clientX));
        dropCurrent();
      }

      function handleKeyDown(event) {
        if (CONFIG.debugMode && (event.key === "1" || event.key === "2")) {
          event.preventDefault();
          changeCurrentFruitForDebug(event.key === "1" ? -1 : 1);
          return;
        }

        if (CONFIG.debugMode && event.key === "3") {
          event.preventDefault();
          changeCurrentObstacleForDebug();
          return;
        }

        if (event.key !== " " && event.key !== "Enter") return;
        if (state.isGameOver || !state.current) return;
        event.preventDefault();
        if (state.current.type === "obstacle" && event.shiftKey) {
          throwAwayCurrentObstacle();
          return;
        }
        dropCurrent();
      }

      shell.addEventListener("pointermove", handlePointerMove);
      shell.addEventListener("pointerdown", handlePointerDown);
      shell.addEventListener("pointerup", handlePointerUp);
      shell.addEventListener("pointercancel", resetHoldUi);
      shell.addEventListener("click", handleClickFallback);
      window.addEventListener("keydown", handleKeyDown);
      restartButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        restartGame();
      });

      // ===== Rendering =====
      function resizeCanvasForDpr() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
        const cssScale = rect.width > 0 ? rect.width / CONFIG.fieldWidth : 1;
        const renderScale = Math.max(1, Math.min(3, cssScale * dpr));
        const width = Math.round(CONFIG.fieldWidth * renderScale);
        const height = Math.round(CONFIG.fieldHeight * renderScale);

        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }

        ctx.setTransform(renderScale, 0, 0, renderScale, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
      }

      function drawLoop() {
        resizeCanvasForDpr();
        maybeMakeObstacleHeavy();
        checkGameOver();
        updateHoldUi();
        drawScene();
        if (!state.isGameOver) state.rafId = requestAnimationFrame(drawLoop);
      }

      function drawScene() {
        ctx.clearRect(0, 0, CONFIG.fieldWidth, CONFIG.fieldHeight);
        drawField();

        for (const body of activeBodies()) {
          if (body.plugin.kind === "fruit") drawFruitBody(body);
          if (body.plugin.kind === "obstacle") drawObstacleBody(body);
        }

        if (state.current && !state.isGameOver) {
          drawCurrentPiece();
        } else if (!state.isGameOver && !hasActiveKickEffect()) {
          drawIdleFlyCharacter();
        }
        drawEffects();
      }

      function hasActiveKickEffect() {
        const t = now();
        return state.effects.some((effect) => effect.type === "kick" && t - effect.bornAt < effect.life);
      }

      function drawField() {
        ctx.save();
        ctx.strokeStyle = "rgba(255, 110, 114, 0.95)";
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(0, CONFIG.gameOverLineY);
        ctx.lineTo(CONFIG.fieldWidth, CONFIG.gameOverLineY);
        ctx.stroke();
        ctx.restore();

      }

      function drawBall(x, y, radius, rotation, data, options = {}) {
        const pulse = options.pulse || 1;
        const r = radius * pulse;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation || 0);

        const image = data.image ? imageCache.get(data.image) : null;
        if (image?.complete && image.naturalWidth > 0) {
          const maxSize = r * 2 * (data.imageScale || 1);
          const aspect = image.naturalWidth / image.naturalHeight;
          const drawWidth = aspect >= 1 ? maxSize : maxSize * aspect;
          const drawHeight = aspect >= 1 ? maxSize / aspect : maxSize;
          const offsetX = (data.imageOffsetX || 0) * pulse;
          const offsetY = (data.imageOffsetY || 0) * pulse;
          ctx.drawImage(image, offsetX - drawWidth / 2, offsetY - drawHeight / 2, drawWidth, drawHeight);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fillStyle = data.color;
          ctx.fill();

          const gradient = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.05, 0, 0, r);
          gradient.addColorStop(0, "rgba(255,255,255,0.55)");
          gradient.addColorStop(0.55, "rgba(255,255,255,0.03)");
          gradient.addColorStop(1, "rgba(0,0,0,0.28)");
          ctx.fillStyle = gradient;
          ctx.fill();

          ctx.lineWidth = Math.max(2, r * 0.08);
          ctx.strokeStyle = options.outline || "rgba(255,255,255,0.35)";
          ctx.stroke();

          ctx.rotate(-(rotation || 0));
          ctx.fillStyle = "#fff9ec";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `900 ${Math.max(12, r * 0.75)}px system-ui, sans-serif`;
          ctx.fillText(data.text, 0, 1);
          ctx.rotate(rotation || 0);
        }

        drawHitCircle(r);
        ctx.restore();
      }

      function drawHitCircle(radius) {
        if (!CONFIG.debugMode || !CONFIG.showHitCircle) return;

        ctx.save();
        ctx.setLineDash([]);
        ctx.strokeStyle = "rgba(255, 40, 40, 0.95)";
        ctx.lineWidth = Math.max(1.5, radius * 0.035);
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-Math.min(10, radius * 0.35), 0);
        ctx.lineTo(Math.min(10, radius * 0.35), 0);
        ctx.moveTo(0, -Math.min(10, radius * 0.35));
        ctx.lineTo(0, Math.min(10, radius * 0.35));
        ctx.stroke();
        ctx.restore();
      }

      function drawImageAsset(src, x, y, width, options = {}) {
        const image = imageCache.get(src);
        if (!image?.complete || image.naturalWidth <= 0) return;

        const aspect = image.naturalWidth / image.naturalHeight;
        const height = width / aspect;
        const rotation = options.rotation || 0;
        const alpha = options.alpha ?? 1;
        const flipX = options.flipX ? -1 : 1;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.scale(flipX, 1);
        ctx.globalAlpha *= alpha;
        ctx.drawImage(image, -width / 2, -height / 2, width, height);
        ctx.restore();
      }

      function updateCharacterSide(x) {
        const side = state.characterSide;
        const centerX = x + (side === "right" ? 34 : -34);
        const halfWidth = 48;

        if (side === "right" && centerX + halfWidth > CONFIG.fieldWidth) {
          state.characterSide = "left";
        } else if (side === "left" && centerX - halfWidth < 0) {
          state.characterSide = "right";
        }
      }

      function chooseKickDirection(x, preferredDirection) {
        const kickWidth = 112.5;
        const kickOffset = 32;
        const halfWidth = kickWidth / 2;
        const kickCenterX = x + preferredDirection * -kickOffset;
        const clips = kickCenterX - halfWidth < 0 || kickCenterX + halfWidth > CONFIG.fieldWidth;
        return clips ? -preferredDirection : preferredDirection;
      }

      function drawFlyCharacter(x, y, showAngry) {
        updateCharacterSide(x);
        const side = state.characterSide;
        const sideSign = side === "right" ? 1 : -1;
        const bob = Math.sin(now() / 180) * 2.5;
        const characterX = x + sideSign * 34;
        const flipX = side === "left";

        drawImageAsset(UI_IMAGES.fly, characterX, y - 56 + bob, 96, { flipX });

        if (showAngry) {
          const angryPulse = 1 + Math.sin(now() / 80) * 0.08;
          drawImageAsset(UI_IMAGES.angry, characterX, y - 84 + bob, 28 * angryPulse, {
            rotation: sideSign * -0.18
          });
        }
      }

      function drawFruitAura(x, y, radius, intensity = 1) {
        const t = now() / 1000;
        const pulse = 1 + Math.sin(t * 5.2) * 0.05;

        ctx.save();
        ctx.translate(x, y);
        ctx.globalCompositeOperation = "lighter";

        const glow = ctx.createRadialGradient(0, 0, radius * 0.78, 0, 0, radius * 1.55 * pulse);
        glow.addColorStop(0, "rgba(80, 170, 255, 0)");
        glow.addColorStop(0.52, `rgba(80, 190, 255, ${0.18 * intensity})`);
        glow.addColorStop(0.76, `rgba(145, 235, 255, ${0.36 * intensity})`);
        glow.addColorStop(1, "rgba(80, 170, 255, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.62 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(145, 235, 255, ${0.7 * intensity})`;
        ctx.lineWidth = Math.max(1.8, radius * 0.055);
        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.13 * pulse, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      function drawObstacleAura(x, y, radius, intensity = 1) {
        const t = now() / 1000;
        const pulse = 0.9 + Math.sin(t * 6.4) * 0.08;
        const spin = t * 2.2;

        ctx.save();
        ctx.translate(x, y);
        ctx.globalCompositeOperation = "lighter";

        const glow = ctx.createRadialGradient(0, 0, radius * 0.35, 0, 0, radius * 1.85 * pulse);
        glow.addColorStop(0, `rgba(255, 25, 45, ${0.12 * intensity})`);
        glow.addColorStop(0.52, `rgba(255, 25, 45, ${0.25 * intensity})`);
        glow.addColorStop(1, "rgba(255, 25, 45, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.9 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.rotate(spin);
        ctx.strokeStyle = `rgba(255, 45, 58, ${0.58 * intensity})`;
        ctx.lineWidth = Math.max(1.5, radius * 0.045);
        ctx.setLineDash([radius * 0.22, radius * 0.16]);
        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.22 * pulse, 0, Math.PI * 2);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.fillStyle = `rgba(255, 55, 65, ${0.75 * intensity})`;
        for (let i = 0; i < 5; i++) {
          const angle = spin * 0.7 + i * Math.PI * 0.4;
          const distance = radius * (1.12 + Math.sin(t * 4 + i) * 0.16);
          ctx.beginPath();
          ctx.arc(Math.cos(angle) * distance, Math.sin(angle) * distance, Math.max(1.6, radius * 0.07), 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawFruitBody(body) {
        const data = FRUITS[body.plugin.level];
        drawBall(body.position.x, body.position.y, data.radius, body.angle, data);
      }

      function drawObstacleBody(body) {
        const data = OBSTACLES.find((item) => item.id === body.plugin.dataId) || OBSTACLES[0];
        drawObstacleAura(body.position.x, body.position.y, data.radius, body.plugin.isHeavy ? 1.08 : 0.82);
        drawBall(body.position.x, body.position.y, data.radius, body.angle, data, {
          outline: "rgba(255,255,255,0.38)"
        });
      }

      function drawCurrentPiece() {
        const data = state.current.data;
        const x = clampCurrentX(state.pointerX);
        const y = CONFIG.spawnY;
        const isReady = state.current.type === "obstacle" && state.holdProgress >= 1;
        const isChargingObstacle = state.current.type === "obstacle" && state.isPointerDown;
        const pulse = isReady ? 1.12 + Math.sin(now() / 60) * 0.04 : 1;

        ctx.save();
        drawFlyCharacter(x, y, isChargingObstacle);
        if (state.current.type === "obstacle") {
          drawObstacleAura(x, y, data.radius * pulse, isReady ? 1.2 : 0.9);
        } else {
          drawFruitAura(x, y, data.radius * pulse, 0.9);
        }
        drawBall(x, y, data.radius, 0, data, {
          pulse,
          outline: isReady ? "#86d1ff" : "rgba(255,255,255,0.62)"
        });

        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, y + data.radius + 8);
        ctx.lineTo(x, CONFIG.fieldHeight - 10);
        ctx.stroke();
        ctx.restore();
      }

      function drawIdleFlyCharacter() {
        const x = clamp(state.pointerX, 24, CONFIG.fieldWidth - 24);
        drawFlyCharacter(x, CONFIG.spawnY, false);
      }

      function drawEffects() {
        const t = now();
        state.effects = state.effects.filter((effect) => t - effect.bornAt < effect.life);

        for (const effect of state.effects) {
          const p = clamp((t - effect.bornAt) / effect.life, 0, 1);
          if (effect.type === "merge") {
            ctx.save();
            ctx.globalAlpha = 1 - p;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(effect.x, effect.y, effect.radius * (0.8 + p * 0.9), 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = effect.color;
            for (const particle of effect.particles) {
              const distance = particle.speed * p * 28;
              ctx.beginPath();
              ctx.arc(
                effect.x + Math.cos(particle.angle) * distance,
                effect.y + Math.sin(particle.angle) * distance,
                3 * (1 - p),
                0,
                Math.PI * 2
              );
              ctx.fill();
            }
            ctx.restore();
          }

          if (effect.type === "throw") {
            ctx.save();
            ctx.globalAlpha = 1 - p;
            const eased = 1 - Math.pow(1 - p, 2);
            const x = effect.x + (effect.exitX - effect.x) * eased;
            const bounce = Math.abs(Math.sin(p * Math.PI * 6));
            const y = effect.y + p * 38 - bounce * 22;
            drawObstacleAura(x, y, effect.radius, 1 - p * 0.28);
            drawBall(x, y, effect.radius, effect.direction * p * 11, effect.data, { pulse: 1 - p * 0.18 });
            ctx.restore();
          }

          if (effect.type === "kick") {
            const fadeIn = clamp(p / 0.12, 0, 1);
            const fadeOut = clamp((1 - p) / 0.07, 0, 1);
            const alpha = Math.min(fadeIn, fadeOut);
            const wobble = Math.sin(p * Math.PI * 5) * 0.035;
            drawImageAsset(UI_IMAGES.kick, effect.x + effect.direction * -32, effect.y - 24, 112.5, {
              alpha,
              rotation: wobble,
              flipX: effect.direction > 0
            });
          }
        }
      }

      window.addEventListener("resize", resizeCanvasForDpr);
      preloadImages();
      restartGame();
    })();
  </script>
</body>
</html>
